services:
  calendarr:
    image: ghcr.io/nino1500/calendarr:latest
    pull_policy: always
    container_name: calendarr
    restart: unless-stopped
    ports:
      - "${CALENDARR_PORT:-3000}:3000"
    environment:
      PORT: 3000
      SONARR_INSTANCES: ${SONARR_INSTANCES:-}
      RADARR_INSTANCES: ${RADARR_INSTANCES:-}
    networks:
      - media
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  media:
    external: true
    name: ${MEDIA_NETWORK:-media}
